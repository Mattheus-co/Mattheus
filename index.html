<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mattheus Co.</title>
    <link rel="icon" type="image/png" href="favicon 2.png">
    <meta name="description" content="Sign up">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <img src="logo.jpg" alt="Mattheus Logo" class="brand-logo" id="logo"
            onerror="this.onerror=null;this.src='logo.png';">

        <div class="content">
            <h1 class="visually-hidden">Mattheus</h1>
            <p class="subtitle">
                For those who settle for nothing less than the very best. Launching soon.
            </p>

            <!-- ✅ NIEUW CUSTOM FORM -->
            <form id="subscribe-form" class="subscribe-form">
                <div class="input-group">
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="Enter your email" 
                        required
                    >

                    <button type="submit" id="submit-btn">
                        <span>Sign me up</span>
                    </button>
                </div>

                <div id="success-message" class="success-message">
                    Thank you.
                </div>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
